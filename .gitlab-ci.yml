stages:
  - lint
  - test
  - build
  - deploy

go-lint:
  stage: lint
  image: golangci/golangci-lint:latest
  script:
    - cd backend
    - golangci-lint run ./...
  only:
    - branches

frontend-lint:
  stage: lint
  image: node:20
  script:
    - cd frontend
    - npm ci
    - npm run lint
  only:
    - branches


go-test:
  stage: test
  image: golang:latest
  script:
    - cd backend
    - go test ./... -timeout 30s -race
  only:
    - branches

frontend-test:
  stage: test
  image: node:20
  script:
    - cd frontend
    - npm ci
    - npm test
  only:
    - branches


docker-build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$DOCKER_PASSWORD" | docker login --username "$DOCKER_USERNAME" --password-stdin
  script:
    - docker build -t "$DOCKER_USERNAME/taxiapp:$CI_COMMIT_SHA" .
    - docker build -t "$DOCKER_USERNAME/taxiapp-frontend:$CI_COMMIT_SHA" -f Dockerfile.frontend .
    - docker tag "$DOCKER_USERNAME/taxiapp:$CI_COMMIT_SHA" "$DOCKER_USERNAME/taxiapp:latest"
    - docker tag "$DOCKER_USERNAME/taxiapp-frontend:$CI_COMMIT_SHA" "$DOCKER_USERNAME/taxiapp-frontend:latest"
    - docker push "$DOCKER_USERNAME/taxiapp:$CI_COMMIT_SHA"
    - docker push "$DOCKER_USERNAME/taxiapp:latest"
    - docker push "$DOCKER_USERNAME/taxiapp-frontend:$CI_COMMIT_SHA"
    - docker push "$DOCKER_USERNAME/taxiapp-frontend:latest"
  only:
    - branches

deploy:
  stage: deploy
  image: alpine:latest
  variables:
    GIT_STRATEGY: none
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh ec2-user@"$EC2_HOST" << 'EOF'
        set -e

        /opt/taxi-app/load-params.sh

        cd /opt/taxi-app

        docker-compose pull

        docker-compose up -d
      EOF
  only:
    - main

